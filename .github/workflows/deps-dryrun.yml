name: Deps dry-run

# ─────────────────────────────────────────────────────────────────────────────
# TEMPORARY — delete before/after merging the action-bump PR.
# CI (lint-and-test) doesn't exercise upload-artifact / download-artifact, which
# power the digest hand-off in the native multi-arch build. This validates the
# bumped versions (upload-artifact@v7, download-artifact@v8) end-to-end: build
# both arches, pass digests via artifacts, merge into a throwaway :deps-dryrun
# manifest on GHCR, and inspect it. No deploy, real :edge tag untouched.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [fix/release-drafter-and-action-bumps]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_GHCR: ghcr.io/x-rous/actual-bench

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_GHCR }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: true
          sbom: true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: List downloaded digests (sanity)
        run: ls -la /tmp/digests && test -n "$(ls -A /tmp/digests)"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_GHCR }}
          tags: type=raw,value=deps-dryrun
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_GHCR }}@sha256:%s ' *)
      - name: Inspect resulting manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE_GHCR }}:deps-dryrun
