# Dev server - runs 24/7, hot-reload via Turbopack.
# Usage: docker compose -f docker/docker-compose.dev.yml up -d --build
#
# Dependency commands must run in this container, not in code-server, because
# native modules such as better-sqlite3 are compiled for the Node runtime that
# serves the app. This dev image uses Node 22.23.1 to match the code-server major
# version and avoid Node 20 native addon ABI mismatches:
#   docker compose -f docker/docker-compose.dev.yml exec actual-bench-dev npm install

services:
  actual-bench-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: actual-bench-dev
    working_dir: /workspace
    user: "1000:1000"
    volumes:
      # Source code - edits on the host are reflected immediately via HMR.
      - /opt/projects/actual-bench:/workspace
      # Persist Actual Bench app metadata used by /app-health and future flows.
      - /opt/projects/actual-bench/.actual-bench-data:/data
    command: >
      sh -c "
        if [ ! -d node_modules/.bin ] || [ ! -d node_modules/better-sqlite3 ]; then npm install; fi &&
        npm rebuild better-sqlite3 &&
        rm -rf .next-build/dev &&
        npm run dev -- --hostname 0.0.0.0
      "
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - ACTUAL_BENCH_DB_PATH=/data/actual-bench.sqlite
      - NEXT_DEV_ALLOWED_ORIGINS=actual-bench-dev.nafverse.com,*.nafverse.com
      - SYNC_VAULT_KEY="d4-KIJAZ4aRnh2yByM0_dpWJzehwMHHYu_lg1xJeiH8IA3kyTePdOjUIiApaKCvC"
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.abe-dev.rule=Host(`actual-bench-dev.nafverse.com`)"
      - "traefik.http.routers.abe-dev.entrypoints=websecure"
      - "traefik.http.routers.abe-dev.tls.certresolver=le"
      - "traefik.http.services.abe-dev.loadbalancer.server.port=3000"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
