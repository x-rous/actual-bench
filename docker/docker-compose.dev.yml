# Dev server — runs 24/7, hot-reload via Turbopack.
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
#
# First-time setup (run once on the host before starting the container):
#   cd /opt/projects/actual-admin-panel && npm install

services:
  actual-bench-dev:
    image: node:20-alpine
    container_name: actual-bench-dev
    working_dir: /workspace
    user: "1000:1000"
    volumes:
      # Source code — edits on the host are reflected immediately via HMR
      - /opt/projects/actual-bench:/workspace
      # Persist Turbopack's build cache across container restarts.
      # Without this, every restart rebuilds from scratch and triggers
      # an HMR loop while Turbopack writes its initial dev/types/*.ts files.
      - next-build-cache:/workspace/.next-build
    # Do NOT run npm install here — install on the host once and let the
    # volume mount bring node_modules in. Installing inside the container on
    # every start is slow and compiles native addons for the wrong platform.
    #command: npm run dev -- --hostname 0.0.0.0
    command: sh -c "npm run dev -- --hostname 0.0.0.0"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.abe-dev.rule=Host(`actual-bench-dev.nafverse.com`)"
      - "traefik.http.routers.abe-dev.entrypoints=websecure"
      - "traefik.http.routers.abe-dev.tls.certresolver=le"
      - "traefik.http.services.abe-dev.loadbalancer.server.port=3000"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true

volumes:
  # Docker-managed named volume — survives container restarts and recreations.
  # To clear the Turbopack cache manually: docker volume rm next-build-cache
  next-build-cache: